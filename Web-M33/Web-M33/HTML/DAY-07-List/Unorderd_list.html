<!DOCTYPE HTML>
<html>
    <head>
        <title>
            UnorderedList
        </title>
    </head>
    <body>
        <h1>2.Unordered List</h1>
       
        <h2>type=disc(default) </h2>
        <ul type="disc" >
            <li> HTML </li>
            <li> CSS </li>
            <li> Tailwind </li>
            <li> JS </li>
            <li> React JS </li>
        </ul>
        <h2>type=Square </h2>
        <ul type="square" >
            <li> HTML </li>
            <li> CSS </li>
            <li> Tailwind </li>
            <li> JS </li>
            <li> React JS </li>
        </ul>
        <h2>type=Circle</h2>
        <ul type="circle" >
            <li> HTML </li>
            <li> CSS </li>
            <li> Tailwind </li>
            <li> JS </li>
            <li> React JS </li>
        </ul>
        <h2>type=none</h2>
        <ul type="none" >
            <li> HTML </li>
            <li> CSS </li>
            <li> Tailwind </li>
            <li> JS </li>
            <li> React JS </li>
        </ul>
        
    </body>
</html>
