<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>
          <h2>Job Application Form</h2>
        </legend>

        <table>
          <tr>
            <td><label for="">FirstName:</label></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td><label for="">LastName:</label></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td><label for="">Email:</label></td>
            <td><input type="email" name="email" id="" /></td>
          </tr>
          <tr>
            <td><label for="">Phone:</label></td>
            <td><input type="tel" name="phone" id="" /></td>
          </tr>
          <tr>
            <td><label for="">DOB:</label></td>
            <td><input type="date" name="DOB" id="" /></td>
          </tr>
          <tr>
            <td><label for="">Gender:</label></td>
            <td>
              <input type="radio" name="gender" id="" /> Male
              <input type="radio" name="gender" id="" /> Female
              <input type="radio" name="gender" id="" /> Others
            </td>
          </tr>
          <tr>
            <td><label for="">Addres:</label></td>
            <td>
              <textarea name="Address" id=""></textarea>
            </td>
          </tr>
          <tr>
            <td><label for="">City:</label></td>
            <td>
              <input
                type="text"
                placeholder="Type or Search your city"
                list="cities"
              />
              <datalist id="cities">
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
              </datalist>
            </td>
          </tr>
          <tr>
            <td><label for="">State:</label></td>
            <td>
              <input
                type="text"
                placeholder="Type or Search your state" id=""
              />
            </td>
          </tr>
          <tr>
            <td><label for="">Pin Code:</label></td>
            <td>
              <input
                type="text"
                placeholder="Type your pin code" id=""
              />
            </td>
          </tr>
          <tr>
            <td><label for="">Position Applied for:</label></td>
            <td>
              <select name="Job Position" id="">
                <option value="" disabled Selected>Select a position</option>
                <option value="">Software Engineer</option>
                <option value="">Product Manager</option>
                <option value="">Designer</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><label for="">Upload Resume:</label></td>
            <td>
              <input type="file" name="resume" id="" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="">Linkedin Profile:</label>
            </td>
            <td>
              <input type="url" name="linkedin" id="" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="">Available Start Date:</label>
            </td>
            <td>
              <input type="date" name="start date" id="" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="">Expected Salary:</label>
            </td>
            <td>
              <input type="text" name="salary" id="" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="">Willing to Relocate:</label>
              <select name="relocate" id="">
                <option value="">Yes</option>
                <option value="">No</option>
            </td>
          </tr>
          <tr>
            <td>
              <input type="submit" value="Submit Application" />
            </td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
