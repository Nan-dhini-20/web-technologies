<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* ID Selector*/
        #tvk{
            color:yellow;
            background-color: red;
        }
         /* class Selector*/
        .tn{
            color:rgb(1, 1, 1);
            border:1px solid black;
        }
         /* tagname or element Selector*/
        div{
            color:blueviolet;
            border:1px solid black;
        }
         /* universal Selector*/
         *{
            background-color: beige;
         }
    </style>
</head>
<body>
    <h1> Simple Selectors - id, class, tagname, universal</h1>
    <h2 id="tvk">Today TVK will win. </h2>
    <h2> dmk will also win.</h2> <!--- having 2 or more same tag so using id unique identifier-->
    <hr/>
    <p class="tn">TVK</p>
    <p class="tn">ADMK</p>
    <p class="tn">NTK</p>
    <hr/>
    <div> </div>
</body>
</html>
