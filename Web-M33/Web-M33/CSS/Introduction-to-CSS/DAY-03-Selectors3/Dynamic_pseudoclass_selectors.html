<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link{
            color:blueviolet;
        }
        a:visited{
            color:brown;
        }
        a:hover{
            color:rgb(4, 4, 4);
            background-color: rgb(216, 112, 221);
            text-decoration: none;
        }
        a:active{
            color:blue;
        }
        input:focus{
            color:burlywood;
            border:1px solid;
            outline:none;
            border-color: brown;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <h1> pseudo class selectors</h1>
    <a href="https://www.google.com/">Google</a>
    <a href="https://www.facebook.com/">Facebook</a>
    <a href="https://www.Instagram.com/">Instagram</a>
    <div></div>
    <hr/>
    <a href="https://undraw.co/" id="link5">Undraw</a>
    <input type="text">
</body>
</html>
