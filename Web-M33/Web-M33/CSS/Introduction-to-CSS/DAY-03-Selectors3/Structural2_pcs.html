<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section div:first-of-type{
            color:bisque;
            background-color: blueviolet;
            border: 1px solid;
            width:100px;
            height:100px;
        }
        section p:first-of-type{
            color:black;
            background-color: bisque;
        }
        section div:last-of-type{
            color:blueviolet;
            background-color: darkkhaki;
            height:100px;
            width:100px;
        }
        section h1:last-of-type{
            color:brown;
            background-color: burlywood;
        }
    </style>
</head>
<body>
    <section>
        <h1>Heading-1</h1>
        <p>paragraph-1</p>
        <div>Container-1</div>
        <h1>Heading-2</h1>
        <p>paragraph-2</p>
        <div>Container-2</div>
    </section>
</body>
</html>
