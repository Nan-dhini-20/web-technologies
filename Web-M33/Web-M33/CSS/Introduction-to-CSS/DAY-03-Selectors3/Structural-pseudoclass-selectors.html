<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div h1:first-child{
            background-color:aqua;
        }
        div p:last-child{
            background-color:bisque;
        }
        div p:nth-child(3){
            background-color:brown;
        }
        div h1:nth-child(odd){
            background-color:cadetblue;
        }
        div p:nth-child(even){
            background-color:burlywood;
        }
    </style>
</head>
<body>
    <div>
        <h1>Heading-1</h1>
        <h1>Heading-2</h1>
        <p>paragraph-1</p>
        <h1>Heading-3</h1>
        <h1>Heading-4</h1>
        <p>paragraph-2</p>
        <p>paragraph-3</p>
    </div>
    <!---p*10{Content-$}--->
    <div>
      <p>Content-1</p>
      <p>Content-2</p>
      <p>Content-3</p>
      <p>Content-4</p>
      <p>Content-5</p>
      <p>Content-6</p>
      <p>Content-7</p>
      <p>Content-8</p>
      <p>Content-9</p>
      <p>Content-10</p>
    </div>
</body>
</html>
