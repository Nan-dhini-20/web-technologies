<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0px;
            margin:0px;
            box-sizing:border-box;
        }
        .box{
            width:200%;
            height:100vh;
            border: 2px solid rgb(189, 42, 42);
            text-align: center;
            line-height:100vh;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }
        h1{
            font-size: 100px;
            color:rgb(220, 206, 206);
        }
        #box1{
            background-image: url(https://images8.alphacoders.com/957/thumb-1920-957090.jpg);
        }
        #box2{
            background-image: url(https://wallpaperaccess.com/full/55555.jpg);
        }
        #box3{
            background-image: url(https://i.pinimg.com/originals/f1/e1/45/f1e1459f48468a04d9bf55c1fdbd9559.jpg);
        }
        #box4{
            background-image: url(https://wallpapers.com/images/hd/fan-made-poster-incredible-hulk-k8yx97ab5bmalavk.jpg);
        }
        #box5{
            background-image: url(https://wallpaperaccess.com/full/408920.png);
        }
        #box6{
            background-image: url(https://wallpaperaccess.com/full/11459574.jpg);
        }
    </style>
</head>
<body>
    
    <div class="box" id="box1">
        <h1>Avengers</h1>
    </div>
    <div class="box" id="box2">
        <h1>Captain America</h1>
    </div>
    <div class="box" id="box3">
        <h1>Iron Man</h1>
    </div>
    <div class="box" id="box4">
        <h1>Incredible Hulk</h1>
    </div>
    <div class="box" id="box5">
        <h1>Thor</h1>
    </div>
    <div class="box" id="box6">
        <h1>Spider Man</h1>
    </div>
</body>
</html>
