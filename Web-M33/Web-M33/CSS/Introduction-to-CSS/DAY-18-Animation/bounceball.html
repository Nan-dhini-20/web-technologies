<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
            font-family:'Times New Roman', Times, serif;
        }
        body{
            display:flex;
            justify-content: space-around;
            align-items:center;
            flex-direction:column;
            height:100vh;

        }
        .container{
            width:1000px;
            height:600px;
            display:flex;
            justify-content: space-evenly;
            align-items: end;
            border-bottom: 2px solid pink;
        }
        .ball{
            width:80px;
            height:80px;
            border-radius:50%;
            display:flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgb(129, 129, 216), rgb(238, 158, 172));
            box-shadow: 0px 7px 30px 0px rgba(0,0,0 );
            animation:bounceBall 1s linear infinite; 
            animation-direction: alternate-reverse;  /*bounce*/
        }
        #ball1{
            animation-delay: 0s;
            animation-direction: reverse;
        }
        #ball2{
            animation-delay: 0.2s;
            animation-direction: alternate;    /*bounce*/
        }
        #ball3{
            animation-delay: 0.3s;
        }
        #ball4{
            animation-delay: 0.5s;
        }
        #ball5{
            animation-delay: 0.6s;
        }

        @keyframes bounceBall{
            from{
                transform: translateY(0px);
            }
            to{
                transform: translateY(-500px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ball" id="ball1"></div>
        <div class="ball" id="ball2"></div>
        <div class="ball" id="ball3"></div>
        <div class="ball" id="ball4"></div>
        <div class="ball" id="ball5"></div>
    </div>
</body>
</html>
