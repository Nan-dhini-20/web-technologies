<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:10px;
            padding:0px;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }
        .box{
            width:200px;
            height:200px;
            background-color:rgb(87, 176, 209);
            font-size:20px;
            border-radius:8px;
            display:flex;
            justify-content:center;
            align-items:center;
            margin-bottom:30px;
            transition:all 1s ease-in-out;
        }
        #box1{
            transform:translate(20px); /*x-direction -single value*/  
        }
        #box2:hover{
            transform:translate(100px , 20px); /*x and y direction -two values*/
        }
        #box3:hover{
            transform:translate(300px, -50px); /*x and y direction -two values*/
        }
    </style>
</head>
<body>
    <h1>Transform property</h1>
    <div class="box" id="box1">translate(x, y)</div>
    <div class="box" id="box2">translate(x)</div>
    <div class="box" id="box3">translate(y)</div>
</body>
</html>
