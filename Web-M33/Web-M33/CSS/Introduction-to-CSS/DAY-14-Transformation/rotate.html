<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Times New Roman', Times, serif;
        }
        body{
            display:flex;
            flex-direction: column;
            align-items:center;
            justify-content: space-evenly;
            height:100vh;

        }
        .parent{
            width:90%;
            height:400px;
            background-color: black;
            display:flex;
            justify-content:space-evenly;
            align-items:center;
            border-radius:3px;
        }
        .box{
            width:300px;
            height:300px;
            background-color: brown;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            border-radius:3px;
            margin:20px ;
            transition:all 3s ease-in-out;
        }
        #box1:hover{
            transform:rotate(360deg); /*rotateZ() -single value*/
            background-color: chocolate;

        }
        #box2:hover{
            transform:rotateX(180deg); /*rotateX() -single value*/
            background-color: darkmagenta;
        }
        #box3:hover{
            transform:rotateY(-50deg); /*rotateY() -single value*/
            background-color: dodgerblue;

        }
    </style>
</head>
<body>
    <h1>transform:rotate(degree) property</h1>
    <div class="parent">
        <div class="box" id="box1">rotateZ()</div>
        <div class="box" id="box2">rotateX()</div>
        <div class="box" id="box3">rotateY()</div>
    </div>
</body>
</html>
